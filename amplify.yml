version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --legacy-peer-deps
    build:
      commands:
        - |
          # SiteContfy (Amplify) usa AWS_APP_ID=d64oxvnbymsbo — sem variável manual no console
          if [ "$DEPLOY_TARGET" = "site" ] || [ "$AWS_APP_ID" = "d64oxvnbymsbo" ]; then
            echo "Build: site (SiteContfy / contfy.com.br)"
            npx ng build --configuration site
            rm -rf dist/deploy
            mkdir -p dist/deploy
            cp -r dist/contfy-site/browser/. dist/deploy/
          else
            echo "Build: app (contabilcontfy.com.br)"
            npx ng build --configuration production
            rm -rf dist/deploy
            mkdir -p dist/deploy
            cp -r dist/novoangularbackv2/browser/. dist/deploy/
          fi
  artifacts:
    baseDirectory: dist/deploy
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .angular/cache/**/*
  customHeaders:
    - pattern: '**/*.js'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    - pattern: '**/*.css'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    - pattern: '**/*.{png,jpg,jpeg,gif,ico,svg,webp,woff,woff2}'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
    - pattern: '/index.html'
      headers:
        - key: Cache-Control
          value: 'no-cache, no-store, must-revalidate'
        - key: X-Frame-Options
          value: 'SAMEORIGIN'
        - key: X-Content-Type-Options
          value: 'nosniff'
        - key: X-XSS-Protection
          value: '1; mode=block'
        - key: Referrer-Policy
          value: 'strict-origin-when-cross-origin'
