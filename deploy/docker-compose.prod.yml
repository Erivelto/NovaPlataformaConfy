version: '3.7'

services:
  # ==============================
  # Frontend Angular (Nginx)
  # ==============================
  contfy-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: contfy-web
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      - API_URL=${API_URL:-https://contfyapinovo-dnhygmhpg2gjerh4.canadacentral-01.azurewebsites.net}
    restart: unless-stopped
    networks:
      - contfy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==============================
  # n8n (Automação / Workflows)
  # ==============================
  n8n:
    image: n8nio/n8n:latest
    container_name: contfy-n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
    volumes:
      - ../n8n:/home/node/.n8n
    restart: unless-stopped
    networks:
      - contfy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==============================
  # JSON Server (Mock API) — opcional, remover em produção real
  # ==============================
  json-server:
    image: node:20-alpine
    container_name: contfy-mock-api
    working_dir: /data
    command: sh -lc "npx json-server --watch /data/db.json --host 0.0.0.0 --port 3000"
    ports:
      - "${MOCK_API_PORT:-3000}:3000"
    volumes:
      - ../mock-api:/data
    restart: unless-stopped
    networks:
      - contfy-network
    profiles:
      - mock

networks:
  contfy-network:
    driver: bridge
